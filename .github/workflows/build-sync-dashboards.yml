name: Docker build the sync dashboard image

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [ "main" ]
    paths:
      - '.github/workflows/build-sync-dashboards.yaml'
      - 'tools/sync_dashboards/**'

jobs:
  build:
    runs-on: 'ubuntu-latest'
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v5

      - name: Login to docker-hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3
        with:
          version: latest

      - name: Docker metadata
        uses: docker/metadata-action@v5
        id: meta-frontent
        with:
          images: georchestra/analytics-syncdashboards
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha
            type=semver,pattern={{version}}

      - name: Build and push docker image
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: ./tools/sync_dashboards
          file: ./tools/sync_dashboards/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref_type == 'tag') }}
          tags: ${{ steps.meta-frontent.outputs.tags }}
          labels: ${{ steps.meta-frontent.outputs.labels }}
